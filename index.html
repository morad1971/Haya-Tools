    <style>
        body {

        }

        .bg-brand-beige { background-color: #F5F5DC; }
        .bg-brand-green { background-color: #556B2F; }
        .text-brand-green { color: #556B2F; }
        .text-brand-dark { color: #3D405B; }
        .border-brand-green { border-color: #556B2F; }
        .focus\:ring-brand-green:focus { --tw-ring-color: #556B2F; }
        .focus\:border-brand-green:focus { border-color: #556B2F; }
        
        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            header, footer, #non-print-area, .back-buttons {

            }
        }
    </style>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">

                                    <th class="px-2 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">الكمية</th>
                                    <th class="px-2 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">PV</th>
                                    <th class="px-2 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">SV</th>
                                    <th class="px-2 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">السعر (DP)</th>
                                    <th class="px-2 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider"></th>
                                </tr>
                            </thead>
                            <tbody id="cart-table-body" class="bg-white divide-y divide-gray-200">
                                <tr id="empty-cart-row"><td colspan="6" class="text-center py-4 text-gray-500">قائمتك فارغة.</td></tr>
                            </tbody>
                            <tfoot class="bg-gray-100 font-bold">
                                <tr>
                                    <td class="px-6 py-3 text-right" colspan="2">الإجمالي:</td>
                                    <td id="total-pv" class="px-2 py-3 text-center">0.00</td>
                                    <td id="total-sv" class="px-2 py-3 text-center">0.00</td>
                                    <td id="total-cost" class="px-2 py-3 text-center">0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                </div>

        </div>

        ];
        
        const productSelect = document.getElementById('product-select');
        const quantityInput = document.getElementById('product-quantity');
        const addToCartBtn = document.getElementById('add-to-cart-btn');
        const cartTableBody = document.getElementById('cart-table-body');
        const emptyCartRow = document.getElementById('empty-cart-row');
        
        const totalPvEl = document.getElementById('total-pv');
        const totalSvEl = document.getElementById('total-sv');
        const totalCostEl = document.getElementById('total-cost');
        
        const ppvFromCartInput = document.getElementById('ppv-from-cart');

        let shoppingCart = [];

        function populateProductSelect() {
            if (!productSelect) return;
            allProducts.sort((a, b) => a.name.localeCompare(b.name));
            productSelect.innerHTML = '<option value="">-- اختاري منتج --</option>' + allProducts.map(p => 
                `<option value="${p['Product Code']}">
                    ${p.name} (PV: ${p.PV}, السعر: ${p.DP} د.أ)
                </option>`
            ).join('');
        }

        function renderCart() {
            cartTableBody.innerHTML = '';
            if (shoppingCart.length === 0) {
                cartTableBody.appendChild(emptyCartRow);
            } else {
                 shoppingCart.forEach(item => {
                    const product = allProducts.find(p => p['Product Code'] === item.code);
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${product.name}</td>
                        <td class="px-2 py-4 text-center text-sm">${item.quantity}</td>
                        <td class="px-2 py-4 text-center text-sm">${(product.PV * item.quantity).toFixed(2)}</td>
                        <td class="px-2 py-4 text-center text-sm">${(product.SV * item.quantity).toFixed(2)}</td>
                        <td class="px-2 py-4 text-center text-sm">${(product.DP * item.quantity).toFixed(2)}</td>
                        <td class="px-2 py-4 text-center text-sm">
                            <button class="remove-item-btn text-red-500 hover:text-red-700" data-code="${item.code}">حذف</button>
                        </td>
                    `;
                    cartTableBody.appendChild(row);
                });
            }
            updateCartTotals();
            addRemoveListeners();
        }

        function updateCartTotals() {
            let totalPV = 0, totalSV = 0, totalCost = 0;
            shoppingCart.forEach(item => {
                const product = allProducts.find(p => p['Product Code'] === item.code);
                totalPV += product.PV * item.quantity;
                totalSV += product.SV * item.quantity;
                totalCost += product.DP * item.quantity;
            });
            totalPvEl.textContent = totalPV.toFixed(2);
            totalSvEl.textContent = totalSV.toFixed(2);
            totalCostEl.textContent = totalCost.toFixed(2);
            
            // Link to performance tracker
            ppvFromCartInput.value = totalPV.toFixed(2);
        }
        
        function addRemoveListeners() {
            document.querySelectorAll('.remove-item-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const productCode = e.target.dataset.code;
                    shoppingCart = shoppingCart.filter(item => item.code !== productCode);
                    renderCart();
                });
            });
        }

        addToCartBtn.addEventListener('click', () => {
            const productCode = productSelect.value;
            const quantity = parseInt(quantityInput.value);
            if (!productCode || isNaN(quantity) || quantity < 1) return;
            const existingItem = shoppingCart.find(item => item.code === productCode);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                shoppingCart.push({ code: productCode, quantity: quantity });
            }
            renderCart();
        });

        // --- INITIALIZE ---
        populateProductSelect();
        renderCart();
    });
    </script>
</body>
</html>
